[pytest]
# Pytest configuration for kfxgen

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --verbose
    -m "not slow and not device and not tier3_strict"

# pytest 9 only escalates --strict-markers to a collection error when the flag
# comes from the CLI; from addopts it stays a warning. Promoting the warning
# class explicitly closes the gap so unknown markers fail the test suite.
#
# strict-by-design: any pytest plugin (or our own code) that emits
# PytestUnknownMarkWarning will fail collection. If a future plugin
# legitimately needs an unknown marker, add it to the markers = list
# below rather than relaxing this filter — that's what strict-markers
# is supposed to enforce.
filterwarnings =
    error::pytest.PytestUnknownMarkWarning

# Markers
# Tier markers encode the oracle hierarchy from CONTRIBUTING.md.
# CI runs `not device`; pre-push hook runs `tier1`; release tags require manual `device` sign-off.
markers =
    tier1: in-process Python invariants (cheapest, runs every PR + pre-push)
    tier2: Calibre kfxlib differential decode (independent provenance, runs every PR)
    tier3: golden-file diff against device-verified corpus (runs every PR)
    tier3_strict: byte-identical golden diff (opt-in; run with `pytest -m tier3_strict`)
    device: requires physical Kindle device (manual, gates release tags only)
    critical: critical tests that must always pass (e.g. KFX fragment presence)
    slow: slow-running tests like corpus validation (skip with: pytest -m "not slow")
    unit: unit tests (fast, isolated)
    integration: integration tests (multi-component)
    benchmark: performance benchmark tests

# Coverage options (when using --cov)
# Run with: pytest --cov=kfxgen --cov-report=html
[coverage:run]
source = plugin/kfxgen
omit =
    */tests/*
    */conftest.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
fail_under = 80
